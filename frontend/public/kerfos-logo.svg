<svg viewBox="0 0 320 80" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="KerfOS">
  <defs>
    <!-- Clip: upper-right triangle of the mark square -->
    <clipPath id="upper-clip">
      <polygon points="0,0 56,0 0,56"/>
    </clipPath>
    <!-- Clip: lower-left triangle -->
    <clipPath id="lower-clip">
      <polygon points="56,0 56,56 0,56"/>
    </clipPath>
    <!-- Subtle glow for the kerf line -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- ── Mark ────────────────────────────────────────────────────────── -->
  <!-- Upper-right piece: dark navy, shifted (-1, -1) toward upper-left -->
  <g transform="translate(11, 11)">
    <!-- Full square in dark, clipped to upper-right triangle -->
    <rect x="-2" y="-2" width="60" height="60" rx="3" fill="#0a0e1c" clip-path="url(#upper-clip)"/>
  </g>

  <!-- Lower-left piece: cyan accent, shifted (+1, +1) toward lower-right -->
  <g transform="translate(13, 13)">
    <rect x="-2" y="-2" width="60" height="60" rx="3" fill="#06b6d4" clip-path="url(#lower-clip)"/>
  </g>

  <!-- Kerf line — the material removed — thin, bright, precise -->
  <line
    x1="11" y1="11"
    x2="67" y2="67"
    stroke="#00e5ff"
    stroke-width="1.2"
    stroke-linecap="round"
    filter="url(#glow)"
    opacity="0.9"
  />

  <!-- ── Wordmark ──────────────────────────────────────────────────── -->
  <text
    x="86" y="53"
    font-family="-apple-system, BlinkMacSystemFont, 'Inter', 'Helvetica Neue', sans-serif"
    font-size="36"
    font-weight="700"
    letter-spacing="-1"
    fill="#0a0e1c"
  >Kerf<tspan fill="#06b6d4" letter-spacing="-0.5">OS</tspan></text>
</svg>
