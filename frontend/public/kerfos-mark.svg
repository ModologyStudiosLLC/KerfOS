<svg viewBox="0 0 56 56" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="KerfOS mark">
  <defs>
    <clipPath id="u">
      <polygon points="0,0 56,0 0,56"/>
    </clipPath>
    <clipPath id="l">
      <polygon points="56,0 56,56 0,56"/>
    </clipPath>
    <filter id="g" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="1.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Upper-right: dark navy, shifted upper-left -->
  <rect x="0" y="0" width="54" height="54" rx="4" fill="#0a0e1c" clip-path="url(#u)"/>

  <!-- Lower-left: cyan, shifted lower-right -->
  <g transform="translate(2, 2)">
    <rect x="0" y="0" width="54" height="54" rx="4" fill="#06b6d4" clip-path="url(#l)"/>
  </g>

  <!-- Kerf line -->
  <line x1="1" y1="1" x2="55" y2="55" stroke="#00e5ff" stroke-width="1.5" stroke-linecap="round" filter="url(#g)"/>
</svg>
