# Rollback Workflow (Cloudflare Pages)
# ---------------------------------
# This workflow allows manual rollback of frontend and/or backend deployments.
# Usage: Actions tab → Rollback → Run workflow → Select tag

name: Rollback

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Target tag to rollback to (e.g., v1.0.1)'
        required: true
        type: string
      component:
        description: 'Component to rollback'
        required: true
        type: choice
        options:
          - frontend
          - backend
          - both

jobs:
  # ====================
  # Rollback Frontend
  # ====================
  rollback-frontend:
    name: Rollback Frontend (Cloudflare Pages)
    runs-on: ubuntu-latest
    if: github.event.inputs.component == 'frontend' || github.event.inputs.component == 'both'
    environment:
      name: production
      url: https://modology-cabinet-designer.pages.dev
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch target tag
        run: |
          git fetch --tags
          git checkout ${{ github.event.inputs.tag }}

      - name: Install Wrangler CLI
        run: npm install -g wrangler

      - name: Download artifacts from target tag
        uses: dawidd6/action-download-artifact@v3
        with:
          workflow: frontend.yml
          name: frontend-build
          path: frontend/.next
          branch: ${{ github.event.inputs.tag }}

      - name: Rollback to Cloudflare Pages
        working-directory: ./frontend
        run: |
          wrangler pages deploy \
            .next \
            --project-name=modology-cabinet-designer \
            --branch=main \
            --message="Rollback to tag ${{ github.event.inputs.tag }}"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Verify rollback
        run: |
          sleep 30
          curl -f https://modology-cabinet-designer.pages.dev || exit 1

  # ====================
  # Rollback Backend
  # ====================
  rollback-backend:
    name: Rollback Backend (Railway)
    runs-on: ubuntu-latest
    if: github.event.inputs.component == 'backend' || github.event.inputs.component == 'both'
    environment:
      name: production
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch target tag
        run: |
          git fetch --tags
          git checkout ${{ github.event.inputs.tag }}

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Rollback to Railway
        run: |
          railway rollback --service=backend --commit=${{ github.event.inputs.tag }}
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

      - name: Wait for backend to stabilize
        run: sleep 30

      - name: Health check
        run: |
          curl -f ${{ vars.RAILWAY_BACKEND_URL || 'https://api.modology-cabinet-designer.pages.dev' }}/api/health || exit 1

  # ====================
  # Slack Notification
  # ====================
  slack-notify:
    name: Slack Notification
    runs-on: ubuntu-latest
    needs: [rollback-frontend, rollback-backend]
    if: always() && secrets.SLACK_WEBHOOK_URL != ''
    steps:
      - name: Send Slack notification
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          text: |
            Rollback completed
            Repository: ${{ github.repository }}
            Tag: ${{ github.event.inputs.tag }}
            Component: ${{ github.event.inputs.component }}
            Status: ${{ needs.rollback-frontend.result }}${{ needs.rollback-backend.result }}
          webhook_url: ${{ secrets.SLACK_WEBHOOK_URL }}
