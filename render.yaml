services:
  - type: web
    name: modology-backend
    env: python
    plan: free
    region: oregon
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        value: postgresql://modology_user:zdP5PV1TolY4rzxUv9XMUvykVTL6wIXN@dpg-d6scv42a214c73bv0vug-a/modology
      - key: PORT
        value: 8000
      - key: NEXT_PUBLIC_API_URL
        sync: false
      - key: NEXTAUTH_SECRET
        generateValue: true
      - key: NEXTAUTH_URL
        sync: false